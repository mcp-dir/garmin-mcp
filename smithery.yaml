# Smithery configuration for Garmin Connect (treinos)
# Schema: https://smithery.ai/docs/build/project-config
# Remote HTTP MCP — server hosted at https://api.mcp.ai/p_garmin

name: garmin-mcp
displayName: "Garmin Connect (treinos)"
description: >
  Listar, obter, criar, editar (substituir), apagar e agendar treinos estruturados no Garmin Connect (corrida, ciclismo, natação, multi-sport / triatlo). Usa a API não oficial via sessão Garmin (email + senha); tokens OAuth são guardados encriptados para reduzir logins.

version: 0.1.0
license: MIT
homepage: https://github.com/mcp-dir/garmin-mcp
repository: https://github.com/mcp-dir/garmin-mcp

tags:
  - garmin
  - brazil
  - med
  - vertical
  - read-only

# Remote HTTP MCP — sem startCommand local (servidor já hospedado)
startCommand:
  type: http
  url: https://api.mcp.ai/p_garmin

auth:
  type: oauth2
  resourceMetadataUrl: https://api.mcp.ai/p_garmin/.well-known/oauth-protected-resource
  fallback:
    type: agent-auth
    description: >
      Para clientes sem OAuth 2.1. O agente expõe uma tool authenticate(token).
      Usuário gera o JWT em https://app.mcp.ai/agent-auth e cola no chat.
